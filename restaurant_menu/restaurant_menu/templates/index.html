<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f8f8f8;
        }

        h1 {
            text-align: center;
        }

        .category {
            margin-top: 40px;
        }

        .item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .price {
            float: right;
            font-weight: bold;
        }

        .description {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h1>🍽 Restaurant Menu</h1>

{% for category, items in grouped_items.items %}
    <div class="category">
        <h2>{{ category }}</h2>

        {% for item in items %}
            <div class="item">
                <h3>
                    {{ item.meal }}
                    <span class="price">${{ item.price }}</span>
                </h3>
                <p class="description">{{ item.description }}</p>
            </div>
        {% empty %}
            <p>No items available.</p>
        {% endfor %}
    </div>
{% endfor %}

</body>
</html>
