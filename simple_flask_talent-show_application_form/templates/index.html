<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary bg-gradient d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg p-4 rounded-4" style="width: 400px;">

    <h2 class="text-center text-primary mb-4 fw-bold">
         Job Application Form
    </h2>

    <form method="post">

        <!-- First Name -->
        <div class="mb-3">
            <label for="first_name" class="form-label text-success fw-semibold">First Name</label>
            <input type="text" class="form-control border-success" id="first_name" name="first_name" required>
        </div>

        <!-- Last Name -->
        <div class="mb-3">
            <label for="last_name" class="form-label text-success fw-semibold">Last Name</label>
            <input type="text" class="form-control border-success" id="last_name" name="last_name" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label text-warning fw-semibold">Email</label>
            <input type="email" class="form-control border-warning" id="email" name="email" required>
        </div>

        <!-- Date -->
        <div class="mb-3">
            <label for="date" class="form-label text-info fw-semibold">Available Start Date</label>
            <input type="date" class="form-control border-info" id="date" name="date"required>
        </div>

        <!-- Occupation -->
        <div class="mb-3">
            <label class="form-label text-danger fw-semibold">Current Occupation</label>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="occupation" id="employed" value="Employed" required>
                <label class="form-check-label text-dark" for="employed">Employed</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="occupation" id="unemployed" value="unemployed">
                <label class="form-check-label text-dark" for="unemployed">Unemployed</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="occupation" id="self-employed" value="self-employed">
                <label class="form-check-label text-dark" for="self-employed">Self-Employed</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="occupation" id="student" value="student">
                <label class="form-check-label text-dark" for="student">Student</label>
            </div>
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-danger w-100 fw-bold rounded-pill">
             Submit Application
        </button>

    </form>
</div>

</body>
</html>
